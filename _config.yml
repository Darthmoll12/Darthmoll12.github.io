title: Nathaniel Moll
description: I'm Nathaniel Moll — a rising senior at Liberty University majoring in biochemistry and molecular biology and minoring in physics. I aim to research and build at the interface of computational biophysics, machine learning for biological systems, and biosensor development. Right now, I'm working at Oak Ridge National Laboratory to test different event-based sensors for radiation detection. I hope to translate the skills I learn here to projects involving biosensing and health monitoring.
